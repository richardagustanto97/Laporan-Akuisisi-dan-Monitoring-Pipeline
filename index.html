<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Monitoring & Akuisisi</title>
    <link rel="stylesheet" href="style.css">
<base target="_blank">
</head>
<body>
    <div class="container">
        <section id="page1">
            <h2>Data Monitoring & Akuisisi</h2>
            <div class="input-group">
                <label>Tanggal Pelaporan</label>
                <input type="date" id="mon-date">
            </div>
            <div class="input-group">
                <label>Kode Cabang</label>
                <input type="text" id="branch-code" placeholder="Masukkan 5 digit kode">
                <p id="error-msg" style="color: red; display: none; font-size: 12px;">Kode Cabang tidak terdaftar!</p>
            </div>

            <button onclick="validateStep1()" class="submit-btn">Next</button>
            <button onclick="checkPassword()" class="secondary-btn">Hasil input</button>       
        </section>

        <section id="page-nip" style="display:none;">
            <h2>Verifikasi NIP</h2>
            <div class="input-group">
                <label>Masukkan NIP Anda</label>
                <input type="text" id="nip-code" placeholder="NIP">
            </div>
            <button class="submit-btn" onclick="submitNIP()">Lanjut</button>
            <button class="back-btn" onclick="goToPage('page-main-menu')">Kembali</button>
        </section>

        <section id="page-main-menu" style="display:none;">
            <h2 id="main-title">Pilih Menu Utama</h2>
            <div class="menu-grid">
                <button class="menu-btn" onclick="selectMainMenu('monitoring')">Menu Monitoring</button>
                <button class="menu-btn" onclick="selectMainMenu('akuisisi')">Menu Akuisisi</button>
                <button class="menu-btn" onclick="selectMainMenu('pipeline_merchant')">Pipeline GMM Merchant Senator dari Livin</button>
            </div>
        </section>

        <!-- PAGE PIPELINE MERCHANT -->
        <section id="page-pipeline-merchant" style="display:none;">
            <h2>Pipeline GMM Merchant Senator dari Livin</h2>
            <div id="pipeline-loading" style="text-align:center; padding:20px; color:#666;">
                <p>Memuat data merchant...</p>
            </div>
            <div id="pipeline-content" style="display:none;">
                <div class="input-group">
                    <label>Pilih Nama Merchant</label>
                    <input type="text" id="merchant-input" list="merchant-list" placeholder="Ketik atau pilih merchant..." autocomplete="off" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box;">
                    <datalist id="merchant-list"></datalist>
                </div>

                <div class="input-group">
                    <label>Sudah Visit / Belum</label>
                    <select id="visit-status" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
                        <option value="" disabled selected>-- Pilih Status Visit --</option>
                        <option value="Sudah">Sudah</option>
                        <option value="Belum">Belum</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Tanggal Visit</label>
                    <input type="date" id="visit-date" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
                </div>

                <div class="input-group">
                    <label>Hasil Visit</label>
                    <select id="visit-result" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:14px;">
                        <option value="" disabled selected>-- Pilih Hasil Visit --</option>
                        <option value="Merchant Eksisting, Klaim ke tim TBR">Merchant Eksisting, Klaim ke tim TBR</option>
                        <option value="Penawaran">Penawaran</option>
                        <option value="Done Deal">Done Deal</option>
                        <option value="Collect Dokumen">Collect Dokumen</option>
                        <option value="On Proses MTI">On Proses MTI</option>
                        <option value="Done Akuisisi">Done Akuisisi</option>
                        <option value="Visit Ulang">Visit Ulang</option>
                        <option value="Tidak Berminat">Tidak Berminat</option>
                        <option value="Tidak Ditemukan">Tidak Ditemukan</option>
                        <option value="Tutup Permanen">Tutup Permanen</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Keterangan</label>
                    <input type="text" id="keterangan-pipeline" placeholder="Masukkan keterangan">
                </div>
                <button id="btn-submit-pipeline" class="submit-btn" onclick="submitPipelineMerchant()">Submit Data</button>
            </div>
            <div id="pipeline-error" style="display:none; color:red; text-align:center; padding:15px;"></div>
            <button class="back-btn" onclick="goToPage('page-main-menu')" style="margin-top:15px;">Kembali</button>
        </section>

        <section id="page2" style="display:none;">
            <h2 id="menu-title">Kategori</h2>
            <div id="category-options" class="menu-grid"></div>
            <button class="back-btn" onclick="goToPage('page-main-menu')">Kembali</button>
        </section>

        <section id="page3" style="display:none;">
            <h2 id="sub-title">Sub Kategori</h2>
            <div id="sub-options" class="menu-grid"></div>
            <hr>
            <div id="dynamic-input-area" style="display:none;">
                <label id="question-label" style="font-weight: bold;"></label>
                <div class="input-group" style="margin-top: 15px;">
                    <label>Jumlah Data yang di Input</label>
                    <input type="number" id="follow-up-count" placeholder="Contoh: 1" oninput="generateTextInputs()">
                </div>
                <div id="text-inputs-container"></div>
                <button id="submit-btn" class="submit-btn" onclick="submitFinalData()">Submit Data</button>
            </div>
            <button class="back-btn" onclick="goBackToCategories()">Kembali</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
